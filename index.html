<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ganesh Kalal | Civil & Structural Engineer</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="scrollBar" class="scroll-progress"></div>

<div class="bg-animation">
    <div class="grid-overlay"></div>
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
</div>

<nav class="nav">
    <div class="wrap nav-inner">
        <div class="logo">
            <div class="logo-badge">GK</div>
            <div class="logo-text">
                <strong id="navName">Ganesh Kalal</strong>
            </div>
        </div>
        <button id="themeToggle" class="btn btn-icon theme-toggle-btn" aria-label="Toggle Theme">
            <span id="themeIcon">🌓</span>
        </button>
    </div>
</nav>

<div class="wrap main-content">
    <header class="hero reveal">
        <span id="kicker" class="kicker"></span>
        <h1 id="heroTitle" class="gradient-text"></h1>
        <p id="heroSubtitle" class="sub"></p>
        
        <div class="hero-actions">
            <a id="downloadCvLink" href="#" target="_blank" class="btn btn-primary pulse-btn" style="display:none;">Download CV</a>
            <a id="linkedinLink" href="#" target="_blank" class="btn">Connect on LinkedIn</a>
        </div>

        <div id="stats" class="stats"></div>
    </header>

    <section class="section">
        <div class="section-head reveal">
            <h2>Engineering Approach</h2>
            <p class="muted">How I deliver complex infrastructure.</p>
        </div>
        <div id="bentoGrid" class="bento"></div>
    </section>

    <section class="section">
        <div class="section-head reveal">
            <h2>Major Project Delivery</h2>
            <p class="muted">High-stakes civil, structural, and decommissioning works.</p>
        </div>
        <div id="projectsGrid" class="projects"></div>
    </section>

    <section class="section">
        <div class="section-head reveal">
            <h2>Career Progression</h2>
            <p class="muted">My journey across Tier-1 and Tier-2 environments.</p>
        </div>
        <div id="timelineList" class="timeline"></div>
    </section>

    <footer class="footer reveal">
        <div id="contactLines" class="contact-lines"></div>
        <div class="signature">
            <em id="signatureLine"></em>
        </div>
    </footer>
</div>

<div id="modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-card">
        <button id="closeModalBtn" class="modal-x" aria-label="Close">✕</button>
        <div class="modal-content">
            <span id="modalKicker" class="modal-kicker"></span>
            <h2 id="modalTitle" class="modal-title gradient-text"></h2>
            <p id="modalText" class="modal-text"></p>
            <ul id="modalList" class="modal-list"></ul>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
