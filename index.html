<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ganesh Kalal | Civil & Structural Engineer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="scrollBar" class="scroll-progress"></div>

<div class="bg-animation">
    <div class="grid-overlay"></div>
    <div class="glow-orb orb-1"></div>
</div>

<nav class="nav">
    <div class="wrap nav-inner">
        <div class="logo">
            <div class="logo-badge">GK</div>
            <div class="logo-text"><strong>Ganesh Kalal</strong></div>
        </div>
        <button id="themeToggle" class="btn btn-icon">🌓</button>
    </div>
</nav>

<div class="wrap main-content">
    <header class="hero reveal">
        <span class="kicker" id="kicker"></span>
        <h1 class="gradient-text" id="heroTitle"></h1>
        <p class="sub" id="heroSubtitle"></p>
        
        <div id="stats" class="stats"></div>
    </header>

    <section class="section">
        <div class="section-head reveal">
            <h2>Major Project Delivery</h2>
            <p class="muted">High-stakes civil and structural works.</p>
        </div>
        <div id="projectsGrid" class="projects"></div>
    </section>

    <section class="section">
        <div class="section-head reveal">
            <h2>Career Progression</h2>
            <p class="muted">A visual journey of professional growth.</p>
        </div>
        <div id="timelineList" class="timeline"></div>
    </section>
</div>

<div id="modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-card">
        <button id="closeModalBtn" class="modal-x">✕</button>
        <div class="modal-content">
            <h2 id="modalTitle" class="modal-title gradient-text"></h2>
            <p id="modalText" class="modal-text"></p>
            <ul id="modalList" class="modal-list"></ul>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
