<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ganesh Kalal | Engineering Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    
    <style>
        /* =========================================
           ALL CSS STYLES ARE NOW SECURELY IN HERE
        ========================================= */
        :root {
            --bg-main: #020308;
            --bg-glass: rgba(10, 15, 25, 0.65);
            --border-glass: rgba(255, 255, 255, 0.12);
            --text-primary: #ffffff;
            --text-muted: #cbd5e1; 
            --accent: #00f0ff; 
            --accent-dark: #0088ff; 
            --accent-glow: rgba(0, 240, 255, 0.4);
            --success: #10b981;
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --input-bg: rgba(255, 255, 255, 0.05);
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --ease-fluid: cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="light"] {
            --bg-main: #f8fafc;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --border-glass: rgba(15, 23, 42, 0.15);
            --text-primary: #0f172a;
            --text-muted: #334155;
            --accent: #0284c7; 
            --accent-dark: #0369a1; 
            --accent-glow: rgba(2, 132, 199, 0.2);
            --input-bg: rgba(255,255,255,0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow-x: hidden; width: 100%; background-color: transparent !important; }
        body { font-family: var(--font-body); color: var(--text-primary); line-height: 1.7; -webkit-font-smoothing: antialiased; }
        body.custom-cursor-active * { cursor: none !important; }

        .wrap { max-width: 1280px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 10; }
        .section { padding: 6rem 0; position: relative; z-index: 10; }
        .mt-2 { margin-top: 2rem; }
        .p-3 { padding: 2rem; }
        .pb-large { padding-bottom: 8rem; }

        /* VIDEO BACKGROUND SYSTEM */
        .video-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -999; overflow: hidden; background-color: #020308; }
        .video-container video { width: 100vw; height: 100vh; object-fit: cover; opacity: 0.85; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: linear-gradient(to bottom, rgba(2,3,8,0.2) 0%, rgba(2,3,8,0.9) 100%); pointer-events: none; z-index: 1; }
        [data-theme="light"] .video-container video { opacity: 0.15; filter: invert(1); }
        [data-theme="light"] .video-overlay { background: linear-gradient(to bottom, rgba(248,250,252,0.5) 0%, rgba(248,250,252,0.98) 100%); }
        .noise-overlay { position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.04; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }

        main, nav, footer, .modal { position: relative; z-index: 10; }

        /* CURSOR */
        .cursor-dot { width: 6px; height: 6px; background-color: var(--text-primary); position: fixed; border-radius: 50%; z-index: 10000; pointer-events: none; transform: translate(-50%, -50%); display: none; }
        .cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.4); position: fixed; border-radius: 50%; z-index: 9999; pointer-events: none; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s, background-color 0.3s; display: none; }
